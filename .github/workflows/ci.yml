name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        env:
          # Default placeholder values supaya build bisa jalan tanpa secrets.
          # Override via repo Secrets/Variables jika perlu.
          NEXT_PUBLIC_WHATSAPP_NUMBER: "6285713254800"
          NEXT_PUBLIC_SITE_URL: "https://mushida-craft.vercel.app"
          ADMIN_EMAIL: "admin@mushida.me"
          ADMIN_PASSWORD: "changeme123"
        run: npm run build
